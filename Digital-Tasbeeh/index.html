<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="script.js" defer></script>
  <style>
    body {
      display: flex;
      flex-direction: column; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #030303;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      direction: rtl;
    }

    #status {
      text-align: center;
      max-width: 600px; 
      width: 90%; 
      padding: 30px 20px;
      font-size: 24px;
      color: #ffffff;
      background-color: #746c6c; 
      border-radius: 15px; 
      box-shadow: 0 10px 20px rgb(255, 255, 255); 
      margin-bottom: 40px;
      line-height: 1.6; 
    }

  
    button {
      padding: 15px 50px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background-color: #27ae60; 
      border: none;
      border-radius: 50px; 
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s;
      box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
    }

 
    button:hover {
      background-color: #219150;
    }


    button:active {
      transform: scale(0.95); 
    }
  </style>
</head>
<body>
  <h2 id="status">لا اله الا الله وحده لاشريك له له الملك وله الحمد وهو على كل شيء قدير </h2>
  <button id="startBtn" onclick="startTasbeeh()">أبدا</button>
</body>
</html>
